# dbt Profiles Configuration
# Supports both PostgreSQL (local) and BigQuery (production)

github_archive:
  target: postgres  # Default target

  outputs:
    # PostgreSQL configuration (local development)
    postgres:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('POSTGRES_DATABASE', 'github_archive') }}"
      schema: staging
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      search_path: "staging,marts,raw,public"

    # BigQuery configuration (production)
    bigquery:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: staging
      threads: 4
      timeout_seconds: 300
      location: "{{ env_var('BIGQUERY_LOCATION', 'US') }}"
      priority: interactive
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"

    # Docker PostgreSQL (when running in Airflow)
    docker:
      type: postgres
      host: postgres
      port: 5432
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('POSTGRES_DATABASE', 'github_archive') }}"
      schema: staging
      threads: 4
      keepalives_idle: 0
      connect_timeout: 10
      search_path: "staging,marts,raw,public"

