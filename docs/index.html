<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Archive Analytics - Dashboards</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }
        header {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
        }
        .dashboards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .dashboard-card {
            background: white;
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .dashboard-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .dashboard-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .dashboard-card h2 {
            color: #667eea;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        .dashboard-card p {
            color: #666;
            line-height: 1.6;
        }
        footer {
            text-align: center;
            color: white;
            margin-top: 3rem;
            opacity: 0.8;
        }
        footer a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 GitHub Archive Analytics</h1>
            <div class="subtitle">Interactive Dashboards</div>
        </header>
        
        <div class="dashboards">
            <a href="dashboard-executive-overview.png" class="dashboard-card">
                <div class="dashboard-icon">👔</div>
                <h2>Executive Overview</h2>
                <p>High-level metrics and trends for leadership</p>
            </a>
            
            <a href="dashboard-technical-deep-dive.png" class="dashboard-card">
                <div class="dashboard-icon">⚙️</div>
                <h2>Technical Deep Dive</h2>
                <p>Detailed technical metrics and analysis</p>
            </a>
        </div>
        
        <footer>
            <p>Powered by Metabase • Hosted on GitHub Pages</p>
            <p style="margin-top: 0.5rem; font-size: 0.9rem;">
                Updated automatically from GitHub Archive data
            </p>
        </footer>
    </div>
</body>
</html>
